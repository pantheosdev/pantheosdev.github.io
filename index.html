<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TFSA & FHSA Tracker — Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#080810;color:#e8e8f0;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding-bottom:calc(24px + env(safe-area-inset-bottom,0px))}

/* ── Header / Nav ── */
.hdr{border-bottom:1px solid #12122a;padding:14px 24px;padding-top:calc(14px + env(safe-area-inset-top,0px));position:sticky;top:0;z-index:80;background:rgba(8,8,16,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.hdr h1 span{color:#2563eb}
.title-block{display:flex;align-items:center;gap:10px}
.nav-rows{display:flex;flex-direction:column;gap:6px;align-items:center}
.nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.nav-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;border-top:1px solid #1a1a2e;padding-top:6px}
.nav button{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;background:transparent;color:#667;transition:all .2s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.nav button:hover{color:#aab;background:rgba(255,255,255,.04)}
.nav button:focus-visible{outline:2px solid #2563eb;outline-offset:2px}
.nav button.active{background:#2563eb;color:#fff}
.nav button.sec{background:#1a1a2e;color:#889;border:1px solid #2a2a4a;padding:6px 12px;font-size:11px}
.nav button.sec:hover{border-color:#2563eb;color:#aab}

/* ── Layout ── */
.main{padding:24px;max-width:1200px;margin:0 auto}
.hidden{display:none !important}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ── Cards ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.cards-4{grid-template-columns:repeat(4,1fr)}
.cards-3{grid-template-columns:repeat(3,1fr)}
.card{background:linear-gradient(135deg,#0a0a1a,#101020);border:1px solid #1a1a3a;border-radius:12px;padding:20px 24px;min-width:0;border-left:3px solid #1a1a3a;transition:border-color .3s,transform .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-1px)}
.card.accent-green{border-left-color:#4ade80}
.card.accent-blue{border-left-color:#2563eb}
.card.accent-gold{border-left-color:#fbbf24}
.card.accent-purple{border-left-color:#a78bfa}
.card.warn{background:linear-gradient(135deg,#1a0a0a,#2a1010);border-color:#4a2020;border-left-color:#f87171}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#667;margin-bottom:8px}
.card-val{font-size:26px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:-1px;color:#e8e8f0}
.card.warn .card-val{color:#ff6b6b}
.card-sub{font-size:12px;color:#556;margin-top:4px}
.card.warn .card-sub{color:#cc5555}

/* ── Progress Bar ── */
.card-progress-wrap{margin-top:auto;padding-top:10px}
.card-progress{height:4px;background:#1a1a3a;border-radius:2px;overflow:hidden}
.card-progress-fill{height:100%;border-radius:2px;transition:width .6s ease-out}
.card-progress-fill.fill-green{background:linear-gradient(90deg,#16a34a,#4ade80)}
.card-progress-fill.fill-blue{background:linear-gradient(90deg,#1d4ed8,#60a5fa)}
.card-progress-fill.fill-gold{background:linear-gradient(90deg,#d97706,#fbbf24)}
.card-progress-fill.fill-red{background:linear-gradient(90deg,#dc2626,#f87171)}
.card-progress-fill.fill-purple{background:linear-gradient(90deg,#7c3aed,#a78bfa)}

/* ── View Transitions ── */
.main>div{animation:fadeIn .25s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Smart Tips ── */
.smart-tips{background:linear-gradient(135deg,#0a101a,#0d0d1a);border:1px solid #1a2a3a;border-radius:12px;padding:20px;margin-bottom:24px}
.smart-tips h3{color:#7dd3fc;font-size:14px;margin:0 0 12px;font-weight:600}
.tip{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #111828;font-size:13px;color:#889;line-height:1.6}
.tip:last-child{border-bottom:none}
.tip-icon{flex-shrink:0;font-size:15px;margin-top:1px}
.tip b{color:#ccd}

/* ── Heatmap ── */
.heatmap{margin-bottom:24px}
.heatmap-title{color:#889;font-size:14px;font-weight:600;margin-bottom:10px}
.heatmap-grid{display:flex;gap:3px;flex-wrap:wrap}
.heatmap-cell{width:14px;height:14px;border-radius:3px;transition:transform .15s}
.heatmap-cell:hover{transform:scale(1.5);z-index:1}
.heatmap-legend{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:10px;color:#556}
.heatmap-legend .heatmap-cell{width:12px;height:12px;cursor:default}
.heatmap-legend .heatmap-cell:hover{transform:none}

/* ── Section Dividers ── */
.section-divider{height:1px;background:linear-gradient(90deg,transparent,#2a2a4a,transparent);margin:32px 0}

/* ── Headings ── */
h2.sec{font-size:14px;text-transform:uppercase;letter-spacing:2px;color:#445;margin-bottom:16px}
.view-title{font-size:18px;font-weight:700;margin-bottom:16px;color:#e8e8f0}
.section-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.section-head h2.sec{margin:0}
.section-head .inline-btns{margin:0}
.section-head .view-title{margin:0}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:13px;font-family:'Space Mono',monospace}
th{padding:10px 12px;text-align:left;color:#556;font-size:11px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #1a1a3a;white-space:nowrap}
th.r{text-align:right}
td{padding:8px 12px;border-bottom:1px solid #0f0f1f}
td.r{text-align:right}
tr.excess{background:#1a0808}
.overflow{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#2a2a4a transparent}
.overflow::-webkit-scrollbar{height:6px}
.overflow::-webkit-scrollbar-track{background:transparent}
.overflow::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:3px}

/* ── Pills / Colors ── */
.pill{padding:2px 10px;border-radius:12px;font-size:11px;white-space:nowrap}
.pill-c{background:#0a2a1a;color:#4ade80}
.pill-w{background:#2a0a0a;color:#f87171}
.pill-tfsa{background:#1a1a3a;color:#7dd3fc}
.pill-fhsa{background:#1a2a1a;color:#4ade80}
.pill-t{background:#1a1a2a;color:#a78bfa}
.green{color:#4ade80}.red{color:#f87171}.blue{color:#7dd3fc}.gold{color:#fbbf24}.dim{color:#556}.mute{color:#99a}.bright{color:#dde}.purple{color:#a78bfa}
.bold{font-weight:600}
.truncate{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Year filter buttons ── */
.yr-btns{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.yr-btn{padding:5px 12px;border-radius:6px;border:1px solid #2a2a4a;background:transparent;color:#aab;font-size:12px;cursor:pointer;transition:all .2s}
.yr-btn.active{border-color:#2563eb;background:#1a2a5a}

/* ── Pagination ── */
.pg{display:flex;justify-content:center;gap:8px;margin-top:16px}
.pg button{padding:6px 12px;border-radius:6px;border:1px solid #2a2a4a;background:transparent;color:#aab;font-size:12px;cursor:pointer}
.pg button:disabled{opacity:.4;cursor:default}
.pg span{padding:6px 12px;color:#667;font-size:12px}

/* ── Panels (reusable box pattern) ── */
.panel{background:#0a0a1a;border:1px solid #1a1a3a;border-radius:12px;padding:20px;margin-bottom:24px}
.panel-title{margin:0 0 12px;font-size:14px;font-weight:600;color:#889}
.panel-text{font-size:13px;color:#667;line-height:1.8;margin:4px 0}
.panel-sub{font-size:12px;color:#556;margin-top:12px}
.cra{background:#0a0f1a;border:1px solid #1a2a4a;border-radius:12px;padding:20px;margin-top:24px}
.cra h3{color:#7dd3fc;margin:0 0 12px;font-size:14px}
.cra p{font-size:12px;color:#667;line-height:1.7;margin:4px 0}
.disclaimer{background:#0d0d18;border:1px solid #2a2a3a;border-radius:10px;padding:14px 18px;margin-top:16px;font-size:11px;color:#556;line-height:1.6}
.note-box{background:#0a0a1a;border:1px solid #1a1a3a;border-radius:12px;padding:20px;margin-top:16px}
.note-box h3{margin:0 0 12px;font-size:14px;color:#889}
.note-box p{font-size:13px;color:#667;line-height:1.8;margin:4px 0}
.note-box.warn-box{border-color:#4a2020}
.note-box.warn-box h3{color:#f87171}
.note-inline{font-size:12px;color:#667;margin-top:8px;line-height:1.6}

/* ── Unified Input Styling (all inputs across the app) ── */
.t-input{background:#12121f;border:1px solid #2a2a4a;border-radius:8px;padding:10px 14px;color:#e8e8f0;font-size:14px;width:100%;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s}
.t-input:focus{border-color:#2563eb}
.t-input::placeholder{color:#445}
.t-label{font-size:11px;color:#667;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}

/* ── Buttons ── */
.add-btn{padding:10px 20px;background:#2563eb;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;white-space:nowrap}
.add-btn:hover{background:#1d4ed8}
.del-btn{background:none;border:none;color:#445;cursor:pointer;font-size:14px;padding:4px 8px;border-radius:4px;transition:color .2s}
.del-btn:hover{color:#f87171}
.inline-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
.inline-btns button{padding:8px 12px;border-radius:8px;border:1px solid #2a2a4a;background:#12121f;color:#aab;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.inline-btns button:hover{border-color:#2563eb;color:#dde}

/* ── Charts ── */
.chrt{background:#0a0a1a;border:1px solid #1a1a3a;border-radius:12px;padding:20px;margin-bottom:24px}
.chrt canvas{max-height:280px;width:100% !important}
.chrt-title{color:#889;font-size:14px;font-weight:600;margin-bottom:12px}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#0d0d1a;border:1px solid #2a2a4a;border-radius:16px;padding:32px;width:440px;max-width:90vw;max-height:90vh;overflow:auto}
.modal h3{margin:0 0 24px;color:#e8e8f0}
.modal .fields{display:flex;flex-direction:column;gap:16px}
.modal label{font-size:11px;color:#667;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.modal input,.modal select,.modal textarea{background:#12121f;border:1px solid #2a2a4a;border-radius:8px;padding:10px 14px;color:#e8e8f0;font-size:14px;width:100%;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:#2563eb}
.modal input::placeholder{color:#445}
.modal .btns{display:flex;gap:12px;margin-top:8px}
.modal .btns button{flex:1;padding:12px;border-radius:8px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.modal .btn-add{background:#2563eb;border:none;color:#fff;font-weight:600}
.modal .btn-add:hover{background:#1d4ed8}
.modal .btn-cancel{background:#1a1a2e;border:1px solid #2a2a4a;color:#889}
.modal .btn-cancel:hover{border-color:#445}

/* ── Toast / Undo ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #2a2a4a;border-radius:10px;padding:12px 20px;color:#e8e8f0;font-size:13px;z-index:2000;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideUp .3s ease-out;max-width:calc(100vw - 32px)}
.toast button{background:#2563eb;border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ── Self-test badge ── */
.engine-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.engine-badge.pass{background:#0a2a1a;color:#4ade80}
.engine-badge.fail{background:#2a0a0a;color:#f87171}

/* ── Interactive Panels (What-if, Reconciliation) ── */
.tool-panel{border-radius:12px;padding:20px;margin-top:24px}
.tool-panel.blue{background:linear-gradient(135deg,#0a0f1a,#0d0d1a);border:1px solid #1a2a4a}
.tool-panel.purple{background:linear-gradient(135deg,#0a0a1a,#0f0a1a);border:1px solid #2a1a4a}
.tool-panel h3{margin:0 0 16px;font-size:14px;font-weight:600}
.tool-panel.blue h3{color:#7dd3fc}
.tool-panel.purple h3{color:#a78bfa}
.tool-panel p.desc{font-size:12px;color:#667;margin-bottom:12px;line-height:1.6}
.tool-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
.tool-row>div{flex:1;min-width:140px}
.tool-row>.tool-action{flex:0 0 auto}
.tool-result{background:#0a0a1a;border:1px solid #1a1a3a;border-radius:8px;padding:14px;margin-top:12px}
.tool-result p{font-size:13px;color:#889;line-height:1.7;margin:2px 0}
.recon-diff{padding:12px 16px;border-radius:8px;font-size:13px;margin-top:8px;line-height:1.7}
.recon-diff p{margin:2px 0}
.recon-diff.match{background:#0a2a1a;color:#4ade80;border:1px solid #1a3a2a}
.recon-diff.mismatch{background:#2a0a0a;color:#f87171;border:1px solid #4a1a1a}

/* ── Annual view sub-headings ── */
.annual-title{font-size:18px;font-weight:700;margin:32px 0 8px;color:#e8e8f0}
.annual-title-first,.annual-title:first-of-type{margin-top:16px}
.annual-desc{font-size:12px;color:#556;margin-bottom:12px;line-height:1.6}

/* ── Structural helpers ── */
.modal-wide{width:760px;max-width:96vw}
.limits-scroll{max-height:260px;border:1px solid #1a1a3a;border-radius:10px;padding:8px;background:#090914}
.limit-input{width:140px}
.actions-cell{text-align:center;white-space:nowrap}
.form-dim{font-size:12px}
.mt-sm{margin-top:8px}
.mt-lg{margin-top:24px}
.view-header{margin-bottom:20px}

/* ── Responsive ── */
@media(max-width:900px){
  .cards-4{grid-template-columns:repeat(2,1fr)}
  .cards-3{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .hdr{padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top,0px))}
  .hdr-top{margin-bottom:8px}
  .hdr h1{font-size:17px}
  .main{padding:14px}
  .g2{grid-template-columns:1fr}

  /* ── Mobile nav: 3-column centered grids ── */
  .nav-main{display:grid;grid-template-columns:repeat(3,1fr);width:100%;gap:6px}
  .nav-actions{display:grid;grid-template-columns:repeat(3,1fr);width:100%;gap:6px}
  .nav button{width:100%;padding:11px 8px;font-size:12px;text-align:center;min-height:44px}
  .nav button.sec{width:100%;padding:10px 8px;font-size:11px;text-align:center;min-height:44px}

  /* ── Mobile inline button groups ── */
  .inline-btns{display:flex;flex-wrap:wrap;gap:8px;width:100%}
  .inline-btns button,.inline-btns .add-btn{flex:1 1 calc(50% - 4px);min-width:0;min-height:44px;text-align:center;font-size:12px}

  /* ── Mobile cards ── */
  .cards{grid-template-columns:repeat(2,1fr);gap:10px}
  .cards-4{grid-template-columns:repeat(2,1fr)}
  .cards-3{grid-template-columns:repeat(2,1fr)}
  .card{padding:14px 12px}
  .card-val{font-size:20px}
  .card-label{font-size:10px;letter-spacing:1.2px}
  .card-sub{font-size:11px}

  /* ── Mobile charts ── */
  .chrt{padding:14px}
  .chrt canvas{max-height:200px}
  .chrt-title{font-size:13px}

  /* ── Mobile typography ── */
  h2.sec{font-size:13px;letter-spacing:1.5px}
  .view-title{font-size:16px}
  .annual-title{font-size:16px}
  .truncate{max-width:none;overflow:visible;text-overflow:clip;white-space:normal}

  /* ── Mobile modal (bottom sheet) ── */
  .modal-bg{align-items:flex-end;padding:0}
  .modal{width:100vw !important;max-width:100vw !important;max-height:88vh;overflow:auto;border-radius:18px 18px 0 0;padding:20px 16px}
  .modal h3{font-size:16px;margin-bottom:16px}
  .modal .btns{position:sticky;bottom:0;background:#0d0d1a;padding:12px 0 4px;margin:0 -2px}
  .modal .btns button{min-height:48px;font-size:15px}

  /* ── Mobile tool panels ── */
  .tool-row{flex-direction:column;gap:10px}
  .tool-row>.tool-action{width:100%}
  .tool-row>.tool-action .add-btn{width:100%;min-height:44px}
  .tool-panel{padding:16px}

  /* ── Mobile tables (card stack) ── */
  table.mobile-stack,table.mobile-stack tbody,table.mobile-stack tr,table.mobile-stack td{display:block;width:100%}
  table.mobile-stack thead{display:none}
  table.mobile-stack tr{background:#0a0a1a;border:1px solid #1a1a3a;border-radius:14px;padding:12px 14px;margin-bottom:10px}
  table.mobile-stack tr.excess{background:linear-gradient(135deg,#1a0808,#120c14)}
  table.mobile-stack td{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #11121e;text-align:right;white-space:normal}
  table.mobile-stack td::before{content:attr(data-label);flex:0 0 auto;text-align:left;color:#667;font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-family:'DM Sans',sans-serif}
  table.mobile-stack td:last-child{border-bottom:none}
  table.mobile-stack td .pill{margin-left:auto}

  /* ── Mobile misc ── */
  .panel{padding:14px}
  .cra{padding:14px}
  .disclaimer{padding:12px 14px;font-size:10px}
  .note-box{padding:14px}
  .yr-btns{gap:4px}
  .yr-btn{padding:6px 10px;font-size:11px;min-height:36px}
  .pg button{min-height:40px;padding:8px 14px}
  .section-head{gap:6px}
  .search-input{max-width:100%}

  /* ── Ensure proper tap targets (WCAG) ── */
  button,a,.yr-btn,.del-btn{min-height:36px}
  .del-btn{padding:6px 10px;font-size:16px}
}

/* ── Small phones ── */
@media(max-width:380px){
  .nav-main,.nav-actions{grid-template-columns:repeat(2,1fr)}
  .cards{grid-template-columns:1fr}
  .cards-4{grid-template-columns:1fr}
  .cards-3{grid-template-columns:1fr}
  .card-val{font-size:18px}
  .nav button{font-size:11px;padding:10px 6px}
  .nav button.sec{font-size:10px;padding:10px 6px}
}

/* ── Theme Toggle ── */
.theme-toggle{background:none;border:1px solid #2a2a4a;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:13px;line-height:1;color:#889;transition:all .2s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.theme-toggle:hover{border-color:#2563eb;color:#dde}

/* ── Light Theme ── */
html.light body{background:#f5f5f8;color:#1a1a2e}
html.light .hdr{background:rgba(245,245,248,.96);border-color:#e0e0e8}
html.light .hdr h1{color:#1a1a2e}
html.light .card{background:linear-gradient(135deg,#fff,#f8f8fc);border-color:#e0e0e8;border-left-color:#e0e0e8}
html.light .card:hover{transform:translateY(-1px)}
html.light .card.accent-green{border-left-color:#16a34a}
html.light .card.accent-blue{border-left-color:#2563eb}
html.light .card.accent-gold{border-left-color:#d97706}
html.light .card.accent-purple{border-left-color:#7c3aed}

let txnFilters = {TFSA:'all', FHSA:'all', tfsaPg:0, fhsaPg:0};

// ─── Utilities ───
function clone(obj){return JSON.parse(JSON.stringify(obj))}
function safeNum(v){const n=Number(v); return Number.isFinite(n)?n:0}
function actualCalendarYear(){return new Date().getFullYear()}
function getCurrentYear(){return Math.max(+trackerConfig.currentYear||0, getLatestLoadedYear())}
function getTfsaStartYear(){return +trackerConfig.tfsaEligibleStartYear||2009}
function getFhsaStartYear(){return +trackerConfig.fhsaFirstYear||2023}
function getTfsaLimits(){return trackerConfig.tfsaAnnualLimits||clone(CONFIG_DEFAULTS.tfsaAnnualLimits)}
function getLatestLoadedYear(){
  let max=actualCalendarYear();
  tT.forEach(t=>{const y=+String(t.d).slice(0,4);if(y>max)max=y});
  fT.forEach(t=>{const y=+String(t.d).slice(0,4);if(y>max)max=y});
  return max;
}
function currentMonthSlotsRemaining(cy){return cy===actualCalendarYear()?Math.max(1,12-new Date().getMonth()):12}
function monthKey(d){return String(d||'').slice(0,7)}
function escAttr(v){return String(v??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
const F=n=>'$'+Math.abs(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});

// ─── Type Normalizers (TFSA now includes Transfer In/Out) ───
function normalizeTfsaType(v){
  const s=String(v||'Contribution').trim().toLowerCase();
  if(s==='w'||s==='withdrawal'||s==='withdraw') return 'Withdrawal';
  if(s==='transfer in'||s==='transfer_in'||s==='xfer in') return 'Transfer In';
  if(s==='transfer out'||s==='transfer_out'||s==='xfer out') return 'Transfer Out';
  return 'Contribution';
}
function normalizeFhsaType(v){
  const raw=String(v||'Contribution').trim();
  const s=raw.toLowerCase();
  const map={
    'contribution':'Contribution','c':'Contribution',
    'rrsp transfer in':'RRSP Transfer In','rrsp transfer':'RRSP Transfer In','rrsp_transfer_in':'RRSP Transfer In',
    'transfer in':'Transfer In',
    'withdrawal':'Taxable Withdrawal','taxable withdrawal':'Taxable Withdrawal',
    'designated withdrawal':'Designated Withdrawal','designated transfer out':'Designated Transfer Out',
    'fhsa direct transfer in':'FHSA Direct Transfer In','direct transfer in':'FHSA Direct Transfer In','fhsa transfer in':'FHSA Direct Transfer In',
    'transfer out':'Transfer Out',
    'fhsa direct transfer out':'FHSA Direct Transfer Out','direct transfer out':'FHSA Direct Transfer Out','fhsa transfer out':'FHSA Direct Transfer Out',
    'qualifying withdrawal':'Qualifying Withdrawal'
  };
  return map[s]||raw||'Contribution';
}
function normalizeFlag(v, fallback){
  const s=String(v||fallback||'Include').trim().toLowerCase();
  if(s==='exclude') return 'Exclude';
  if(s==='review') return 'Review';
  return 'Include';
}
function fhsaTypeMeta(type){
  const t=String(type||'Contribution');
  if(t==='Contribution') return {bucket:'counted_inflow',pill:'pill-c',amountClass:'green',label:t,warning:false};
  if(t==='RRSP Transfer In') return {bucket:'counted_inflow',pill:'pill-fhsa',amountClass:'green',label:t,warning:false};
  if(t==='Transfer In') return {bucket:'counted_inflow',pill:'pill-fhsa',amountClass:'green',label:'Transfer In',warning:true,warningText:'Legacy "Transfer In" treated as RRSP transfer. Reclassify if FHSA-to-FHSA direct transfer.'};
  if(t==='Taxable Withdrawal') return {bucket:'taxable_withdrawal',pill:'pill-w',amountClass:'red',label:t,warning:false};
  if(t==='Designated Withdrawal') return {bucket:'designated_amount',pill:'pill-w',amountClass:'red',label:t,warning:false};
  if(t==='Designated Transfer Out') return {bucket:'designated_amount',pill:'pill-w',amountClass:'red',label:t,warning:false};
  if(t==='FHSA Direct Transfer In') return {bucket:'excluded_transfer',pill:'pill-fhsa',amountClass:'blue',label:t,warning:false};
  if(t==='FHSA Direct Transfer Out') return {bucket:'excluded_transfer',pill:'pill-fhsa',amountClass:'blue',label:t,warning:false};
  if(t==='Transfer Out') return {bucket:'excluded_transfer',pill:'pill-fhsa',amountClass:'blue',label:'Transfer Out',warning:true,warningText:'Legacy "Transfer Out" treated as FHSA direct transfer. Reclassify if designated transfer.'};
  if(t==='Qualifying Withdrawal') return {bucket:'excluded_withdrawal',pill:'pill-w',amountClass:'red',label:t,warning:false};
  return {bucket:'unknown',pill:'pill-w',amountClass:'gold',label:t||'Unknown',warning:true,warningText:'Unknown type — ignored for room calculations.'};
}
function tfsaTypeMeta(type){
  if(type==='Contribution') return {pill:'pill-c',amountClass:'green',label:'Contribution'};
  if(type==='Withdrawal') return {pill:'pill-w',amountClass:'red',label:'Withdrawal'};
  if(type==='Transfer In') return {pill:'pill-t',amountClass:'purple',label:'Transfer In'};
  if(type==='Transfer Out') return {pill:'pill-t',amountClass:'purple',label:'Transfer Out'};
  return {pill:'pill-c',amountClass:'green',label:type};
}

// ═══════════════════════════════════════════════════
// TFSA ENGINE — CRA-Compliant with Transfer Support
// ═══════════════════════════════════════════════════
function makeMonthState(year, openingExcess){
  const m={};
  for(let i=1;i<=12;i++){const k=year+'-'+String(i).padStart(2,'0'); m[k]={s:openingExcess,p:openingExcess,e:openingExcess}}
  return m;
}
function finalizeMonthState(ms, year, yT, openExcess){
  let carry=openExcess;
  for(let i=1;i<=12;i++){
    const k=year+'-'+String(i).padStart(2,'0');
    if(!yT.some(t=>monthKey(t.d)===k)){ms[k]={s:carry,p:carry,e:carry}}
    carry=ms[k].e;
  }
}

function calcTFSA(txns){
  const TL=getTfsaLimits(), TS=getTfsaStartYear(), CY=getCurrentYear();
  const inc=txns
    .map(t=>({d:String(t.d||''),inst:t.inst||'',acct:t.acct||'',type:normalizeTfsaType(t.type),amt:safeNum(t.amt),treat:normalizeFlag(t.treat,'Include'),note:t.note||''}))
    .filter(t=>t.treat==='Include'&&t.d)
    .sort((a,b)=>a.d.localeCompare(b.d));
  const byY={}; inc.forEach(t=>{const y=+t.d.slice(0,4);(byY[y]=byY[y]||[]).push(t)});
  const years={}, mTax=[]; let pNet=0, pAdd=0;
  for(let y=TS;y<=CY;y++){
    const lim=safeNum(TL[y]);
    const co=y===TS?lim:pNet+pAdd+lim;
    const oR=Math.max(0,co), oE=co<0?-co:0;
    let room=oR, excess=oE, tC=0, tW=0, tQ=0, tA=0, tTI=0, tTO=0;
    const ms=makeMonthState(y,oE); let cur=null;
    const yT=byY[y]||[];
    yT.forEach(t=>{
      const k=monthKey(t.d);
      if(k!==cur){if(cur&&ms[cur])ms[cur].e=excess;cur=k;if(ms[k]){ms[k].s=excess;ms[k].p=excess}}
      const amt=safeNum(t.amt);
      if(t.type==='Contribution'){
        tC+=amt;
        if(amt<=room)room-=amt; else{excess+=(amt-room);room=0}
      } else if(t.type==='Withdrawal'){
        tW+=amt;
        const q=Math.min(amt,excess); excess-=q; tQ+=q; tA+=(amt-q);
      } else if(t.type==='Transfer In'){
        tTI+=amt; // room-neutral
      } else if(t.type==='Transfer Out'){
        tTO+=amt; // room-neutral
      }
      if(ms[k])ms[k].p=Math.max(ms[k].p,excess);
    });
    if(cur&&ms[cur])ms[cur].e=excess;
    finalizeMonthState(ms,y,yT,oE);
    let yTx=0;
    for(let i=1;i<=12;i++){
      const k=y+'-'+String(i).padStart(2,'0');
      const me=ms[k]; const tx=Math.round(me.p*0.01*100)/100;
      if(me.p>0.005){mTax.push({month:k,year:y,start:me.s,peak:me.p,end:me.e,tax:tx});yTx+=tx}
    }
    years[y]={limit:lim,openRoom:oR,openExcess:oE,contribs:tC,withdrawals:tW,qualifyingWD:tQ,addbackWD:tA,
      transferIn:tTI,transferOut:tTO,yeRoom:room,yeExcess:excess,netRoom:room-excess,
      tax:Math.round(yTx*100)/100,status:excess>0.005?'excess':tC>0?'ok':'none'};
    pNet=room-excess; pAdd=tA;
  }
  return {years,monthlyTax:mTax};
}

// ═══════════════════════════════════════════════════
// FHSA ENGINE — Simplified Carryforward Formula
// ═══════════════════════════════════════════════════
function calcFHSA(txns){
  const FA=safeNum(trackerConfig.fhsaAnnualLimit)||8000;
  const FL=safeNum(trackerConfig.fhsaLifetimeLimit)||40000;
  const FC=safeNum(trackerConfig.fhsaCarryforwardCap)||8000;
  const FS=getFhsaStartYear(), CY=getCurrentYear();
  const inc=txns
    .map(t=>({d:String(t.d||''),inst:t.inst||'',acct:t.acct||'',type:normalizeFhsaType(t.type),amt:safeNum(t.amt),status:normalizeFlag(t.status,'Include'),note:t.note||''}))
    .filter(t=>t.status==='Include'&&t.d)
    .sort((a,b)=>a.d.localeCompare(b.d));
  const byY={}; inc.forEach(t=>{const y=+t.d.slice(0,4);(byY[y]=byY[y]||[]).push(t)});
  const years={}, mTax=[];
  let lifetimeCountedNet=0;
  let excessPrior=0; // CRA: prior-year excess reduces next year's participation room

  for(let y=FS;y<=CY+5;y++){
    const prev=years[y-1];
    // Carryforward: min($8K cap, max(0, prior year-end unused room))
    const carryforward=(y===FS)?0:Math.min(FC,Math.max(0,safeNum(prev?.yeRoom)));
    // Participation room = annual + carryforward - prior excess, capped by lifetime headroom
    const lifetimeHeadroom=Math.max(0,FL-lifetimeCountedNet);
    const rawParticipation=(y===FS)?FA:Math.max(0,FA+carryforward-excessPrior);
    const participationRoom=Math.min(rawParticipation, lifetimeHeadroom);
    const openRoom=Math.max(0, participationRoom);

    let room=openRoom, excess=0;
    let countedInflows=0, taxableWithdrawals=0, designatedAmounts=0, directTransfers=0, qualifyingWithdrawals=0;
    let ambiguousLegacyCount=0, unknownTypeCount=0;

    const yT=byY[y]||[];
    const ms=makeMonthState(y,0); let cur=null;

    yT.forEach(t=>{
      const meta=fhsaTypeMeta(t.type);
      const amt=safeNum(t.amt);
      const k=monthKey(t.d);
      if(k!==cur){if(cur&&ms[cur])ms[cur].e=excess;cur=k;if(ms[k]){ms[k].s=excess;ms[k].p=excess}}
      if(meta.warning&&(t.type==='Transfer In'||t.type==='Transfer Out'))ambiguousLegacyCount++;
      else if(meta.warning)unknownTypeCount++;

      if(meta.bucket==='counted_inflow'){
        countedInflows+=amt;
        if(amt<=room)room-=amt; else{excess+=(amt-room);room=0}
      } else if(meta.bucket==='taxable_withdrawal'){
        taxableWithdrawals+=amt;
        const q=Math.min(amt,excess); excess-=q; room+=(amt-q);
      } else if(meta.bucket==='designated_amount'){
        designatedAmounts+=amt;
        const q=Math.min(amt,excess); excess-=q; room+=q;
      } else if(meta.bucket==='excluded_transfer'){
        directTransfers+=amt;
      } else if(meta.bucket==='excluded_withdrawal'){
        qualifyingWithdrawals+=amt;
      }
      if(ms[k])ms[k].p=Math.max(ms[k].p,excess);
    });
    if(cur&&ms[cur])ms[cur].e=excess;
    finalizeMonthState(ms,y,yT,0);

    let yTx=0;
    for(let i=1;i<=12;i++){
      const k=y+'-'+String(i).padStart(2,'0');
      const me=ms[k]; const tx=Math.round(me.p*0.01*100)/100;
      if(me.p>0.005){mTax.push({month:k,year:y,start:me.s,peak:me.p,end:me.e,tax:tx});yTx+=tx}
    }

    // Net counted for lifetime: inflows minus amounts that restored lifetime (designated)
    lifetimeCountedNet+=(countedInflows-designatedAmounts);
    const lifetimeLeft=Math.max(0,FL-lifetimeCountedNet);
    const lifetimeUsed=Math.max(0,FL-lifetimeLeft);

    years[y]={openRoom,participationRoom,carryforward,countedInflows,contribs:countedInflows,
      taxableWithdrawals,designatedAmounts,directTransfers,qualifyingWithdrawals,
      yeRoom:room,yeExcess:excess,lifetimeLeft,lifetimeUsed,
      tax:Math.round(yTx*100)/100,ambiguousLegacyCount,unknownTypeCount,
      status:excess>0.005?'excess':countedInflows>0?'ok':'none'};
    excessPrior=excess; // carry forward for next year's participation room deduction
  }
  return {years,monthlyTax:mTax};
}

// ═══════════════════════════════════════════════════
// SELF-TEST ENGINE — Structural validation
// Tests engine logic regardless of loaded data
// ═══════════════════════════════════════════════════
function runSelfTest(){
  const oldConfig=clone(trackerConfig);
  trackerConfig=clone(CONFIG_DEFAULTS);
  trackerConfig.tfsaEligibleStartYear=2024;
  trackerConfig.currentYear=2025;
  trackerConfig.fhsaFirstYear=2024;

  const checks=[];

  // Test 1: Empty data → no excess, no tax
  const e1=calcTFSA([]);
  checks.push({label:'Empty TFSA → zero excess',actual:safeNum(e1.years[2024]?.yeExcess),expected:0,tol:0.01});
  checks.push({label:'Empty TFSA → zero tax',actual:e1.monthlyTax.length,expected:0,tol:0});

  // Test 2: Contribution within limit → room reduced, no excess
  const t2=[{d:'2024-03-01',inst:'Test',acct:'A',type:'Contribution',amt:5000,treat:'Include',note:''}];
  const e2=calcTFSA(t2);
  checks.push({label:'$5K into $7K limit → $2K room',actual:safeNum(e2.years[2024]?.yeRoom),expected:2000,tol:0.01});
  checks.push({label:'$5K into $7K limit → zero excess',actual:safeNum(e2.years[2024]?.yeExcess),expected:0,tol:0.01});

  // Test 3: Over-contribution → correct excess
  const t3=[{d:'2024-03-01',inst:'Test',acct:'A',type:'Contribution',amt:9000,treat:'Include',note:''}];
  const e3=calcTFSA(t3);
  checks.push({label:'$9K into $7K limit → $2K excess',actual:safeNum(e3.years[2024]?.yeExcess),expected:2000,tol:0.01});
  checks.push({label:'$9K into $7K limit → zero room',actual:safeNum(e3.years[2024]?.yeRoom),expected:0,tol:0.01});

  // Test 4: Withdrawal reduces excess
  const t4=[
    {d:'2024-03-01',inst:'Test',acct:'A',type:'Contribution',amt:9000,treat:'Include',note:''},
    {d:'2024-06-01',inst:'Test',acct:'A',type:'Withdrawal',amt:1000,treat:'Include',note:''}
  ];
  const e4=calcTFSA(t4);
  checks.push({label:'$1K WD on $2K excess → $1K excess left',actual:safeNum(e4.years[2024]?.yeExcess),expected:1000,tol:0.01});

  // Test 5: FHSA within limit → no excess
  const f5=[{d:'2024-06-01',inst:'Test',acct:'F',type:'Contribution',status:'Include',amt:6000,note:''}];
  const e5=calcFHSA(f5);
  checks.push({label:'FHSA $6K into $8K → $2K room',actual:safeNum(e5.years[2024]?.yeRoom),expected:2000,tol:0.01});
  checks.push({label:'FHSA $6K → zero excess',actual:safeNum(e5.years[2024]?.yeExcess),expected:0,tol:0.01});

  // Test 6: FHSA over-contribution
  const f6=[{d:'2024-06-01',inst:'Test',acct:'F',type:'Contribution',status:'Include',amt:10000,note:''}];
  const e6=calcFHSA(f6);
  checks.push({label:'FHSA $10K into $8K → $2K excess',actual:safeNum(e6.years[2024]?.yeExcess),expected:2000,tol:0.01});

  // Test 7: Transfer In is room-neutral
  const t7=[{d:'2024-03-01',inst:'Test',acct:'A',type:'Transfer In',amt:50000,treat:'Include',note:''}];
  const e7=calcTFSA(t7);
  checks.push({label:'Transfer In room-neutral',actual:safeNum(e7.years[2024]?.yeExcess),expected:0,tol:0.01});

  // Test 8: Tax is 1% of peak excess
  checks.push({label:'$2K excess → $20/month tax',actual:safeNum(e3.monthlyTax.find(t=>t.month==='2024-03')?.tax),expected:20,tol:0.01});

  trackerConfig=oldConfig;

  let allPass=true;
  const results=checks.map(c=>{
    const pass=Math.abs(safeNum(c.actual)-c.expected)<=c.tol;
    if(!pass)allPass=false;
    return {...c,pass};
  });
  return {allPass,results};
}

// ═══════════════════════════════════════════════════
// PERSISTENCE — with localStorage error handling
// ═══════════════════════════════════════════════════
const STORAGE_KEY='tfsa-fhsa-v7-demo';
function save(){
  try{
    _cachedSelfTest=null; // invalidate on data change
    localStorage.setItem(STORAGE_KEY,JSON.stringify({t:tT,f:fT,config:trackerConfig,prefs:uiPrefs,savedAt:Date.now()}));
  } catch(e){
    console.error('Save failed:',e);
    showToast('⚠️ Could not save — storage may be full.',null,4000);
  }
}
function load(){
  try{
    const keys=[STORAGE_KEY,'tfsa-fhsa-v5-html','tfsa-fhsa-v4'];
    for(const key of keys){
      const s=localStorage.getItem(key);
      if(!s)continue;
      const d=JSON.parse(s);
      if(d.t)tT=d.t;
      if(d.f)fT=d.f;
      if(d.config)trackerConfig=Object.assign(clone(CONFIG_DEFAULTS),d.config,{tfsaAnnualLimits:Object.assign(clone(CONFIG_DEFAULTS.tfsaAnnualLimits),(d.config&&d.config.tfsaAnnualLimits)||{})});
      if(d.prefs)uiPrefs=Object.assign(clone(UI_DEFAULTS),d.prefs);
      return true;
    }
  }catch(e){console.error(e)}
  return false;
}

// TOAST & UNDO SYSTEM
// ═══════════════════════════════════════════════════
let toastTimer=null;
function showToast(msg,undoFn,duration=5000){
  clearTimeout(toastTimer);
  const container=document.getElementById('toast-container');
  let html=`<div class="toast"><span>${msg}</span>`;
  if(undoFn){html+=`<button onclick="executeUndo()">Undo</button>`}
  html+=`</div>`;
  container.innerHTML=html;
  toastTimer=setTimeout(()=>{container.innerHTML='';undoStack=[]},duration);
}
function executeUndo(){
  if(undoStack.length){
    const action=undoStack.pop();
    if(action.type==='delete'){
      const arr=action.plan==='TFSA'?tT:fT;
      arr.splice(action.origIndex,0,action.txn);
      save(); render();
    } else if(action.type==='edit'){
      const arr=action.plan==='TFSA'?tT:fT;
      arr[action.origIndex]=action.oldTxn;
      save(); render();
    }
  }
  document.getElementById('toast-container').innerHTML='';
}

// WHAT-IF SIMULATOR
// ═══════════════════════════════════════════════════
function runWhatIf(){
  const plan=document.getElementById('wi-plan')?.value||'TFSA';
  const amt=safeNum(document.getElementById('wi-amount')?.value);
  const dateVal=document.getElementById('wi-date')?.value||new Date().toISOString().split('T')[0];
  if(amt<=0){document.getElementById('wi-result').innerHTML='<p class="dim">Enter a positive amount to simulate.</p>';return}

  const resultEl=document.getElementById('wi-result');
  if(plan==='TFSA'){
    const fakeTxn={d:dateVal,inst:'What-If',acct:'sim',type:'Contribution',amt,treat:'Include',note:'simulation'};
    const before=calcTFSA(tT);
    const after=calcTFSA([...tT,fakeTxn]);
    const cy=getCurrentYear();
    const bY=before.years[cy]||{}, aY=after.years[cy]||{};
    const roomDrop=safeNum(bY.yeRoom)-safeNum(aY.yeRoom);
    const excessDelta=safeNum(aY.yeExcess)-safeNum(bY.yeExcess);
    const taxDelta=after.monthlyTax.reduce((s,t)=>s+t.tax,0)-before.monthlyTax.reduce((s,t)=>s+t.tax,0);
    resultEl.innerHTML=`<p><b>TFSA What-If: +${F(amt)} on ${dateVal}</b></p>
      <p>Room remaining: ${F(bY.yeRoom)} → <b class="${aY.yeRoom<0.01?'red':'green'}">${F(aY.yeRoom)}</b> (−${F(roomDrop)})</p>
      <p>Year-end excess: ${F(bY.yeExcess)} → <b class="${aY.yeExcess>0.01?'red':'green'}">${F(aY.yeExcess)}</b>${excessDelta>0.01?' (+'+F(excessDelta)+')':''}</p>
      <p>Tax impact: ${taxDelta>0.005?'<b class="red">+'+F(taxDelta)+' indicative tax</b>':'<span class="green">No additional tax</span>'}</p>`;
  } else {
    const fakeTxn={d:dateVal,inst:'What-If',acct:'sim',type:'Contribution',status:'Include',amt,note:'simulation'};
    const before=calcFHSA(fT);
    const after=calcFHSA([...fT,fakeTxn]);
    const cy=getCurrentYear();
    const bY=before.years[cy]||{}, aY=after.years[cy]||{};
    const roomDrop=safeNum(bY.yeRoom)-safeNum(aY.yeRoom);
    const excessDelta=safeNum(aY.yeExcess)-safeNum(bY.yeExcess);
    const taxDelta=after.monthlyTax.reduce((s,t)=>s+t.tax,0)-before.monthlyTax.reduce((s,t)=>s+t.tax,0);
    resultEl.innerHTML=`<p><b>FHSA What-If: +${F(amt)} on ${dateVal}</b></p>
      <p>Room remaining: ${F(bY.yeRoom)} → <b class="${aY.yeRoom<0.01?'red':'green'}">${F(aY.yeRoom)}</b> (−${F(roomDrop)})</p>
      <p>Year-end excess: ${F(bY.yeExcess)} → <b class="${aY.yeExcess>0.01?'red':'green'}">${F(aY.yeExcess)}</b>${excessDelta>0.01?' (+'+F(excessDelta)+')':''}</p>
      <p>Lifetime left: ${F(aY.lifetimeLeft)}</p>
      <p>Tax impact: ${taxDelta>0.005?'<b class="red">+'+F(taxDelta)+' indicative tax</b>':'<span class="green">No additional tax</span>'}</p>`;
  }
}

// ═══════════════════════════════════════════════════
// CRA RECONCILIATION HELPER
// ═══════════════════════════════════════════════════
function runReconciliation(){
  const craRoom=safeNum(document.getElementById('recon-cra-room')?.value);
  if(craRoom<=0){document.getElementById('recon-result').innerHTML='<p class="dim">Enter your CRA-stated room to compare.</p>';return}
  const tfsa=calcTFSA(tT);
  const cy=getCurrentYear();
  const tc=tfsa.years[cy]||{};
  // CRA states opening room for the year, before any current-year contributions
  const trackerOpening=safeNum(tc.openRoom);
  const diff=Math.abs(trackerOpening-craRoom);
  const match=diff<1.00;
  const resultEl=document.getElementById('recon-result');
  resultEl.innerHTML=`<div class="recon-diff ${match?'match':'mismatch'}">
    <p><b>CRA stated opening room (${cy}):</b> ${F(craRoom)}</p>
    <p><b>Tracker computed opening room:</b> ${F(trackerOpening)}</p>
    <p><b>Difference:</b> ${F(diff)} ${match?'✅ Match (within $1)':'⚠️ Mismatch — review transactions or CRA adjustments'}</p>
    ${!match?'<p class="dim" class="mt-sm">Common causes: unrecorded transfers, CRA adjustments, timing differences on late-December transactions, or contributions not yet reflected in CRA systems.</p>':''}
  </div>`;
}

function card(label,value,sub,warn,opts){
  const o=opts||{};
  const cls=['card'];
  if(warn)cls.push('warn');
  if(o.accent&&!warn)cls.push('accent-'+o.accent);
  let h=`<div class="${cls.join(' ')}"><div class="card-label">${label}</div><div class="card-val">${value}</div>`;
  if(sub)h+=`<div class="card-sub">${sub}</div>`;
  if(o.progress!==undefined){
    const pct=Math.max(0,Math.min(100,o.progress));
    h+=`<div class="card-progress-wrap"><div class="card-progress"><div class="card-progress-fill fill-${o.progressColor||'blue'}" style="width:${pct}%"></div></div></div>`;
  }
  h+=`</div>`;
  return h;
}

// CONTRIBUTION HEATMAP
// ═══════════════════════════════════════════════════
function buildHeatmap(cy){
  const allTxns=[...tT.map(t=>({d:t.d,amt:safeNum(t.amt),plan:'TFSA',type:normalizeTfsaType(t.type)})),...fT.map(t=>({d:t.d,amt:safeNum(t.amt),plan:'FHSA',type:normalizeFhsaType(t.type)}))];
  // Build daily totals for last 365 days
  const today=new Date();
  const dayMap={};
  allTxns.forEach(t=>{const d=t.d;if(!d)return;dayMap[d]=(dayMap[d]||0)+t.amt});
  const maxAmt=Math.max(1,...Object.values(dayMap));
  let h='<div class="heatmap"><h3 class="heatmap-title">Contribution Activity (Last 12 Months)</h3><div class="heatmap-grid">';
  for(let i=364;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const key=d.toISOString().split('T')[0];
    const amt=dayMap[key]||0;
    const intensity=amt>0?Math.max(0.2,Math.min(1,amt/maxAmt)):0;
    const bg=amt>0?`rgba(37,99,235,${intensity})`:'#12121f';
    const title=amt>0?`${key}: ${F(amt)}`:`${key}: No activity`;
    h+=`<div class="heatmap-cell" style="background:${bg}" title="${title}"></div>`;
  }
  h+='</div>';
  h+='<div class="heatmap-legend"><span>Less</span>';
  [0,.25,.5,.75,1].forEach(v=>{h+=`<div class="heatmap-cell" style="background:${v===0?'#12121f':`rgba(37,99,235,${v})`}"></div>`});
  h+='<span>More</span></div></div>';
  return h;
}

  fT.forEach(t=>{const k=(t.inst||'Unknown')+' • '+(t.acct||'—');if(!accts[k])accts[k]={c:0,w:0,p:'FHSA'};const meta=fhsaTypeMeta(normalizeFhsaType(t.type));if(meta.bucket==='counted_inflow')accts[k].c+=safeNum(t.amt);else if(meta.bucket!=='excluded_transfer')accts[k].w+=safeNum(t.amt)});
  h+='<div class="panel mt-lg"><h3 class="panel-title">Account Reconciliation</h3><div class="overflow"><table class="mobile-stack"><thead><tr><th>Account</th><th>Plan</th><th class="r">Inflows</th><th class="r">Outflows</th><th class="r">Net</th></tr></thead><tbody>';
  Object.keys(accts).sort((a,b)=>(accts[b].c-accts[b].w)-(accts[a].c-accts[a].w)).forEach(k=>{const v=accts[k];h+='<tr><td data-label="Account" class="mute truncate" title="'+escAttr(k)+'">'+k+'</td><td data-label="Plan"><span class="pill '+(v.p==='TFSA'?'pill-tfsa':'pill-fhsa')+'">'+v.p+'</span></td><td data-label="Inflows" class="r green">'+F(v.c)+'</td><td data-label="Outflows" class="r red">'+F(v.w)+'</td><td data-label="Net" class="r '+(v.c-v.w>=0?'blue':'red')+'">'+F(v.c-v.w)+'</td></tr>'});
  h+='</tbody></table></div></div>';

  document.getElementById('v-insights').innerHTML=h;

  // Render insight charts
  setTimeout(()=>{
    const yrs=Object.keys(tfsa.years).filter(y=>+y>=getTfsaStartYear()&&+y<=cy).sort();

    // Velocity chart
    const ctx4=document.getElementById('c4');
    if(ctx4&&window._charts){window._charts.push(new Chart(ctx4,{type:'bar',data:{labels:yrs,datasets:[
      {label:'TFSA',data:yrs.map(y=>safeNum(tfsa.years[y].contribs)),backgroundColor:'#2563eb'},
      {label:'FHSA',data:yrs.map(y=>fhsa.years[y]?safeNum(fhsa.years[y].countedInflows):0),backgroundColor:'#4ade80'}
    ]},options:{responsive:true,plugins:{legend:{labels:{color:'#889'}}},scales:{x:{ticks:{color:'#667'},grid:{color:'#111'}},y:{ticks:{color:'#667',callback:v=>'$'+v.toLocaleString()},grid:{color:'#111'}}}}}))}

    // Institution Breakdown (donut)
    const ctxInst=document.getElementById('c-inst');
    if(ctxInst&&window._charts){
      const instTotals={};
      [...tT,...fT].forEach(t=>{const inst=t.inst||'Unknown';const tp=tT.includes(t)?normalizeTfsaType(t.type):normalizeFhsaType(t.type);if(tp==='Contribution'||tp==='RRSP Transfer In')instTotals[inst]=(instTotals[inst]||0)+safeNum(t.amt)});
      const sorted=Object.entries(instTotals).sort((a,b)=>b[1]-a[1]);
      const instLabels=sorted.map(([k])=>k);
      const instData=sorted.map(([,v])=>v);
      const instColors=['#2563eb','#4ade80','#fbbf24','#a78bfa','#f87171','#7dd3fc','#fb923c','#e879f9'];
      window._charts.push(new Chart(ctxInst,{type:'doughnut',data:{labels:instLabels,datasets:[{data:instData,backgroundColor:instColors.slice(0,instLabels.length),borderWidth:0}]},options:{responsive:true,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'#889',font:{size:11},padding:12}}}}}));
    }

    // Cumulative Contributions Timeline
    const ctxCum=document.getElementById('c-cum');
    if(ctxCum&&window._charts){
      let cumT=0,cumF=0;
      const cumLabels=[],cumTfsa=[],cumFhsa=[];
      yrs.forEach(y=>{
        cumT+=safeNum(tfsa.years[y]?.contribs);
        cumF+=fhsa.years[y]?safeNum(fhsa.years[y]?.countedInflows):0;
        cumLabels.push(y);cumTfsa.push(cumT);cumFhsa.push(cumF);
      });
      window._charts.push(new Chart(ctxCum,{type:'line',data:{labels:cumLabels,datasets:[
        {label:'TFSA Cumulative',data:cumTfsa,borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.08)',fill:true,tension:.3},
        {label:'FHSA Cumulative',data:cumFhsa,borderColor:'#4ade80',backgroundColor:'rgba(74,222,128,.08)',fill:true,tension:.3}
      ]},options:{responsive:true,plugins:{legend:{labels:{color:'#889'}}},scales:{x:{ticks:{color:'#667'},grid:{color:'#111'}},y:{ticks:{color:'#667',callback:v=>'$'+v.toLocaleString()},grid:{color:'#111'}}}}}));
    }

    // Excess History chart
    const ctx6=document.getElementById('c6');
    if(ctx6&&window._charts){
      const allMonths=[...tfsa.monthlyTax.map(t=>({...t,plan:'TFSA'})),...fhsa.monthlyTax.map(t=>({...t,plan:'FHSA'}))].sort((a,b)=>a.month.localeCompare(b.month));
      const labels=[...new Set(allMonths.map(t=>t.month))].sort();
      const tfsaPeaks=labels.map(m=>{const f=allMonths.find(t=>t.month===m&&t.plan==='TFSA');return f?f.peak:0});
      const fhsaPeaks=labels.map(m=>{const f=allMonths.find(t=>t.month===m&&t.plan==='FHSA');return f?f.peak:0});
      window._charts.push(new Chart(ctx6,{type:'bar',data:{labels,datasets:[
        {label:'TFSA Peak Excess',data:tfsaPeaks,backgroundColor:'rgba(37,99,235,.6)'},
        {label:'FHSA Peak Excess',data:fhsaPeaks,backgroundColor:'rgba(74,222,128,.6)'}
      ]},options:{responsive:true,plugins:{legend:{labels:{color:'#889'}}},scales:{x:{ticks:{color:'#667',maxRotation:45},grid:{color:'#111'}},y:{ticks:{color:'#667',callback:v=>'$'+v.toLocaleString()},grid:{color:'#111'}}}}}));
    }

    // Room Utilization chart
    const ctx7=document.getElementById('c7');
    if(ctx7&&window._charts){
      const utilData=yrs.map(y=>{const yr=tfsa.years[y];const openRoom=safeNum(yr.openRoom);return openRoom>0?Math.min(100,(safeNum(yr.contribs)/openRoom*100)):0});
      window._charts.push(new Chart(ctx7,{type:'bar',data:{labels:yrs,datasets:[
        {label:'% Room Used',data:utilData,backgroundColor:utilData.map(v=>v>100?'#dc2626':v>80?'#fbbf24':'#2563eb')}
      ]},options:{responsive:true,plugins:{legend:{labels:{color:'#889'}}},scales:{x:{ticks:{color:'#667'},grid:{color:'#111'}},y:{max:120,ticks:{color:'#667',callback:v=>v+'%'},grid:{color:'#111'}}}}}))}

    // FHSA Trajectory chart
    const ctx5=document.getElementById('c5');
    if(ctx5&&window._charts){
      const fhsaYrs=Object.keys(fhsa.years).filter(y=>+y>=getFhsaStartYear()&&+y<=cy+5).sort();
      const usedData=fhsaYrs.map(y=>safeNum(fhsa.years[y].lifetimeUsed));
      const capLine=fhsaYrs.map(()=>safeNum(trackerConfig.fhsaLifetimeLimit));
      window._charts.push(new Chart(ctx5,{type:'line',data:{labels:fhsaYrs,datasets:[
        {label:'Lifetime Used',data:usedData,borderColor:'#4ade80',backgroundColor:'rgba(74,222,128,.1)',fill:true,tension:.3},
        {label:'Lifetime Cap',data:capLine,borderColor:'#dc2626',borderDash:[5,5],pointRadius:0,fill:false}
      ]},options:{responsive:true,plugins:{legend:{labels:{color:'#889'}}},scales:{x:{ticks:{color:'#667'},grid:{color:'#111'}},y:{ticks:{color:'#667',callback:v=>'$'+v.toLocaleString()},grid:{color:'#111'}}}}}));
    }
  },200);
}

// ═══════════════════════════════════════════════════
// TRANSACTION TABLE RENDERING
// ═══════════════════════════════════════════════════
function renderTxnTable(plan,rows,pg,total){
  const pp=30, tp=Math.ceil(total/pp);
  let h=`<table class="mobile-stack"><thead><tr><th>Date</th><th>Institution</th><th>Account</th><th>Type</th><th class="r">Amount</th><th>${plan==='TFSA'?'Treatment':'Status'}</th><th class="actions-cell"></th></tr></thead><tbody>`;
  rows.forEach((t,i)=>{
    const idx=pg*pp+i;
    const flag=plan==='TFSA'?(t.treat||'Include'):(t.status||'Include');
    const meta=plan==='TFSA'?tfsaTypeMeta(normalizeTfsaType(t.type)):fhsaTypeMeta(normalizeFhsaType(t.type));
    h+=`<tr><td data-label="Date" class="mute">${t.d}</td><td data-label="Institution" class="mute truncate" title="${escAttr(t.inst||'—')}">${t.inst||'—'}</td><td data-label="Account" class="mute truncate" title="${escAttr(t.acct||'—')}">${t.acct||'—'}</td><td data-label="Type"><span class="pill ${meta.pill}">${meta.label||t.type}</span></td><td data-label="Amount" class="r ${meta.amountClass} bold">${F(t.amt)}</td><td data-label="${plan==='TFSA'?'Treatment':'Status'}" class="dim">${flag}</td><td data-label="Actions" class="actions-cell"><button class="del-btn" title="Edit" onclick="editTxn('${plan}',${idx})" aria-label="Edit transaction">✎</button><button class="del-btn" title="Delete" onclick="delTxn('${plan}',${idx})" aria-label="Delete transaction">×</button></td></tr>`;
  });
  h+=`</tbody></table>`;
  if(tp>1){h+=`<div class="pg"><button onclick="pageTxn('${plan}',-1)" ${pg===0?'disabled':''}>Prev</button><span>${pg+1}/${tp}</span><button onclick="pageTxn('${plan}',1)" ${pg>=tp-1?'disabled':''}>Next</button></div>`}
  return h;
}
function renderTxnView(plan,txns){
  const sorted=[...txns].sort((a,b)=>b.d.localeCompare(a.d));
  const yrs=[...new Set(sorted.map(t=>String(t.d||'').slice(0,4)).filter(Boolean))].sort().reverse();
  let h=`<div class="section-head view-header"><h2 class="view-title">${plan} Transactions</h2><div class="inline-btns">`;
  h+=`<button class="add-btn" onclick="openModal('${plan}')">+ Add</button>`;
  h+=`<button onclick="exportCSV('${plan}')">Export ${plan} CSV</button>`;
  h+=`<button onclick="downloadCSVTemplate('${plan}')">${plan} Template</button>`;
  h+=`</div></div>`;
  h+=`<div class="search-wrap"><input class="search-input" type="text" placeholder="Search by institution, account, date, or note…" value="${escAttr(txnSearch[plan])}" oninput="searchTxns('${plan}',this.value)"></div>`;
  h+=`<div class="yr-btns"><button class="yr-btn active" onclick="filterYear('${plan}','all',this)">All (${txns.length})</button>`;
  yrs.forEach(y=>{h+=`<button class="yr-btn" onclick="filterYear('${plan}','${y}',this)">${y}</button>`});
  h+=`</div>`;
  if(plan==='FHSA'){
    h+=`<div class="note-inline">Types: Contribution, RRSP Transfer In, Taxable Withdrawal, Designated Withdrawal, Designated Transfer Out, FHSA Direct Transfer In/Out, Qualifying Withdrawal.</div>`;
  } else {
    h+=`<div class="note-inline">Types: Contribution, Withdrawal, Transfer In (room-neutral), Transfer Out (room-neutral). Use transfers for institution-to-institution moves.</div>`;
  }
  h+=`<div class="overflow" id="tbl-${plan.toLowerCase()}">${renderTxnTable(plan,sorted.slice(0,30),0,sorted.length)}</div>`;
  return h;
}
function filterYear(plan,yr,btn){txnFilters[plan]=yr;txnFilters[plan.toLowerCase()+'Pg']=0;btn.parentElement.querySelectorAll('.yr-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderFilteredTxns(plan)}
function searchTxns(plan,q){txnSearch[plan]=q;txnFilters[plan.toLowerCase()+'Pg']=0;renderFilteredTxns(plan)}
function renderFilteredTxns(plan){
  const txns=plan==='TFSA'?tT:fT;
  const yr=txnFilters[plan];
  const q=(txnSearch[plan]||'').toLowerCase();
  const sorted=[...txns].sort((a,b)=>b.d.localeCompare(a.d));
  let filtered=yr==='all'?sorted:sorted.filter(t=>String(t.d||'').startsWith(yr));
  if(q){filtered=filtered.filter(t=>{const s=[t.d,t.inst,t.acct,t.type,t.note,String(t.amt)].join(' ').toLowerCase();return s.includes(q)})}
  const pg=txnFilters[plan.toLowerCase()+'Pg']||0;
  document.getElementById('tbl-'+plan.toLowerCase()).innerHTML=renderTxnTable(plan,filtered.slice(pg*30,(pg+1)*30),pg,filtered.length);
}
function pageTxn(plan,dir){txnFilters[plan.toLowerCase()+'Pg']=(txnFilters[plan.toLowerCase()+'Pg']||0)+dir;renderFilteredTxns(plan)}

// ANNUAL TABLE RENDERING
// ═══════════════════════════════════════════════════
function renderAnnualTable(data,type){
  const start=type==='TFSA'?getTfsaStartYear():getFhsaStartYear();
  const end=getCurrentYear();
  const rows=Object.entries(data).filter(([y])=>+y>=start&&+y<=end).sort((a,b)=>+a[0]-+b[0]);
  let h=`<div class="overflow"><table class="mobile-stack"><thead><tr>`;
  if(type==='TFSA'){
    h+=`<th>Year</th><th class="r">Limit</th><th class="r">Contribs</th><th class="r">W/D</th><th class="r">Qual WD</th><th class="r">Addback</th><th class="r">Transfers</th><th class="r">Open</th><th class="r">YE Room</th><th class="r">YE Excess</th><th class="r">Tax</th>`;
  } else {
    h+=`<th>Year</th><th class="r">Part. Room</th><th class="r">Carry</th><th class="r">Counted In</th><th class="r">Taxable WD</th><th class="r">Designated</th><th class="r">YE Room</th><th class="r">YE Excess</th><th class="r">Life Left</th><th class="r">Tax</th>`;
  }
  h+=`</tr></thead><tbody>`;
  rows.forEach(([y,yr])=>{
    const ex=safeNum(yr.yeExcess)>0.005;
    h+=`<tr${ex?' class="excess"':''}><td data-label="Year" class="bright bold">${y}</td>`;
    if(type==='TFSA'){
      const ti=safeNum(yr.transferIn), to=safeNum(yr.transferOut);
      const tfStr=ti>0||to>0?`In ${F(ti)} / Out ${F(to)}`:'—';
      h+=`<td data-label="Limit" class="r dim">${F(yr.limit)}</td><td data-label="Contribs" class="r ${yr.contribs>0?'green':'dim'}">${F(yr.contribs)}</td><td data-label="W/D" class="r ${yr.withdrawals>0?'red':'dim'}">${F(yr.withdrawals)}</td><td data-label="Qual WD" class="r ${yr.qualifyingWD>0.005?'gold':'dim'}">${yr.qualifyingWD>0.005?F(yr.qualifyingWD):'—'}</td><td data-label="Addback" class="r ${yr.addbackWD>0?'blue':'dim'}">${F(yr.addbackWD)}</td><td data-label="Transfers" class="r ${ti+to>0?'purple':'dim'}">${tfStr}</td><td data-label="Open" class="r mute">${F(yr.openRoom)}</td><td data-label="YE Room" class="r blue">${F(yr.yeRoom)}</td><td data-label="YE Excess" class="r ${ex?'red':'dim'}">${ex?F(yr.yeExcess):'—'}</td><td data-label="Tax" class="r ${yr.tax>0?'gold':'dim'}">${yr.tax>0?F(yr.tax):'—'}</td>`;
    } else {
      h+=`<td data-label="Part. Room" class="r mute">${F(yr.participationRoom)}</td><td data-label="Carry" class="r ${yr.carryforward>0?'blue':'dim'}">${F(yr.carryforward)}</td><td data-label="Counted In" class="r ${yr.countedInflows>0?'green':'dim'}">${F(yr.countedInflows)}</td><td data-label="Taxable WD" class="r ${yr.taxableWithdrawals>0?'red':'dim'}">${yr.taxableWithdrawals>0?F(yr.taxableWithdrawals):'—'}</td><td data-label="Designated" class="r ${yr.designatedAmounts>0?'gold':'dim'}">${yr.designatedAmounts>0?F(yr.designatedAmounts):'—'}</td><td data-label="YE Room" class="r blue">${F(yr.yeRoom)}</td><td data-label="YE Excess" class="r ${ex?'red':'dim'}">${ex?F(yr.yeExcess):'—'}</td><td data-label="Life Left" class="r mute">${F(yr.lifetimeLeft)}</td><td data-label="Tax" class="r ${yr.tax>0?'gold':'dim'}">${yr.tax>0?F(yr.tax):'—'}</td>`;
    }
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

function showView(v){
  curView=v;
  ['dashboard','tfsa','fhsa','annual','tax','insights'].forEach(id=>{document.getElementById('v-'+id).classList.toggle('hidden',id!==v)});
  document.querySelectorAll('.nav-main button[data-nav-view]').forEach(b=>b.classList.remove('active'));

// ═══════════════════════════════════════════════════
// MODAL — Add/Edit with validation
// ═══════════════════════════════════════════════════
function buildLookups(){
  const instSet=new Set(), acctSet=new Set();
  [...tT,...fT].forEach(t=>{if(t.inst)instSet.add(t.inst);if(t.acct)acctSet.add(t.acct)});
  const instList=document.getElementById('inst-list');
  const acctList=document.getElementById('acct-list');
  if(instList)instList.innerHTML=[...instSet].sort().map(v=>`<option value="${escAttr(v)}"></option>`).join('');
  if(acctList)acctList.innerHTML=[...acctSet].sort().map(v=>`<option value="${escAttr(v)}"></option>`).join('');
}
function setModalTypeOptions(plan){
  const sel=document.getElementById('m-type');
  if(plan==='TFSA'){
    sel.innerHTML='<option value="Contribution">Contribution</option><option value="Withdrawal">Withdrawal</option><option value="Transfer In">Transfer In (room-neutral)</option><option value="Transfer Out">Transfer Out (room-neutral)</option>';
  } else {
    sel.innerHTML=['<option value="Contribution">Contribution</option>','<option value="RRSP Transfer In">RRSP Transfer In</option>','<option value="Taxable Withdrawal">Taxable Withdrawal</option>','<option value="Designated Withdrawal">Designated Withdrawal</option>','<option value="Designated Transfer Out">Designated Transfer Out</option>','<option value="FHSA Direct Transfer In">FHSA Direct Transfer In</option>','<option value="FHSA Direct Transfer Out">FHSA Direct Transfer Out</option>','<option value="Qualifying Withdrawal">Qualifying Withdrawal</option>'].join('');
  }
}
function syncModalForPlan(plan){
  setModalTypeOptions(plan);
  document.getElementById('m-treat-wrap').classList.toggle('hidden',plan!=='TFSA');
  document.getElementById('m-status-wrap').classList.toggle('hidden',plan==='TFSA');
  const pref=uiPrefs[plan]||{};
  document.getElementById('m-inst').value=pref.inst||'';
  document.getElementById('m-acct').value=pref.acct||'';
  document.getElementById('m-type').value=pref.type||'Contribution';
  document.getElementById('m-treat').value=pref.treat||'Include';
  document.getElementById('m-status').value=pref.status||'Include';
}
function openModal(plan){
  modalPlan=plan; editingIndex=-1;
  buildLookups();
  document.getElementById('modal-title').textContent='Add '+plan+' Transaction';
  document.getElementById('modal-save-btn').textContent='Add';
  document.getElementById('m-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('m-amt').value='';
  document.getElementById('m-note').value='';
  syncModalForPlan(plan);
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal').classList.add('hidden');editingIndex=-1}

function editTxn(plan,idx){
  const txns=plan==='TFSA'?tT:fT;
  const sorted=[...txns].sort((a,b)=>b.d.localeCompare(a.d));
  const yr=txnFilters[plan];
  const filtered=yr==='all'?sorted:sorted.filter(t=>String(t.d||'').startsWith(yr));
  const target=filtered[idx];
  if(!target)return;
  const origIdx=txns.indexOf(target);
  if(origIdx<0)return;

  modalPlan=plan; editingIndex=origIdx;
  buildLookups();
  document.getElementById('modal-title').textContent='Edit '+plan+' Transaction';
  document.getElementById('modal-save-btn').textContent='Save Changes';
  setModalTypeOptions(plan);
  document.getElementById('m-treat-wrap').classList.toggle('hidden',plan!=='TFSA');
  document.getElementById('m-status-wrap').classList.toggle('hidden',plan==='TFSA');
  document.getElementById('m-date').value=target.d||'';
  document.getElementById('m-inst').value=target.inst||'';
  document.getElementById('m-acct').value=target.acct||'';
  document.getElementById('m-type').value=target.type||'Contribution';
  if(plan==='TFSA')document.getElementById('m-treat').value=target.treat||'Include';
  else document.getElementById('m-status').value=target.status||'Include';
  document.getElementById('m-amt').value=target.amt||'';
  document.getElementById('m-note').value=target.note||'';
  document.getElementById('modal').classList.remove('hidden');
}

function saveTxn(){
  const d=document.getElementById('m-date').value;
  const inst=(document.getElementById('m-inst').value||'').trim();
  const acct=(document.getElementById('m-acct').value||'').trim()||'manual';
  const rawType=document.getElementById('m-type').value;
  const amt=safeNum(document.getElementById('m-amt').value);
  const note=(document.getElementById('m-note').value||'').trim();
  if(!d||!inst||amt<=0){alert('Please enter a valid date, institution, and positive amount.');return}

  const isEdit=editingIndex>=0;
  if(modalPlan==='TFSA'){
    const treat=normalizeFlag(document.getElementById('m-treat').value,'Include');
    const type=normalizeTfsaType(rawType);
    const txn={d,inst,acct,type,amt,treat,note};
    if(isEdit){
      const oldTxn=clone(tT[editingIndex]);
      tT[editingIndex]=txn;
      undoStack=[{type:'edit',plan:'TFSA',origIndex:editingIndex,oldTxn}];
    } else {tT.push(txn)}
    uiPrefs.TFSA={inst,acct,type,treat};
  } else {
    const status=normalizeFlag(document.getElementById('m-status').value,'Include');
    const type=normalizeFhsaType(rawType);
    const txn={d,inst,acct,type,amt,status,note};
    if(isEdit){
      const oldTxn=clone(fT[editingIndex]);
      fT[editingIndex]=txn;
      undoStack=[{type:'edit',plan:'FHSA',origIndex:editingIndex,oldTxn}];
    } else {fT.push(txn)}
    uiPrefs.FHSA={inst,acct,type,status};
  }
  editingIndex=-1;
  closeModal(); save(); render();
  if(isEdit) showToast('Transaction updated.',true);
}

function delTxn(plan,idx){
  if(!confirm('Delete this transaction? You can undo within 5 seconds.'))return;
  const txns=plan==='TFSA'?tT:fT;
  const sorted=[...txns].sort((a,b)=>b.d.localeCompare(a.d));
  const yr=txnFilters[plan];
  const filtered=yr==='all'?sorted:sorted.filter(t=>String(t.d||'').startsWith(yr));
  const target=filtered[idx];
  if(!target)return;
  const origIdx=txns.indexOf(target);
  if(origIdx>=0){
    const removed=txns.splice(origIdx,1)[0];
    undoStack=[{type:'delete',plan,origIndex:origIdx,txn:removed}];
    save(); render();
    showToast(`Deleted ${plan} ${F(removed.amt)} on ${removed.d}`,true);
  }
}

// ═══════════════════════════════════════════════════
// CSV IMPORT/EXPORT — with duplicate detection
// ═══════════════════════════════════════════════════
function toCSV(rows){
  const esc=v=>{const s=String(v??'');return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s};
  return rows.map(r=>r.map(esc).join(',')).join('\n');
}
function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  const clean=String(text||'').replace(/^\uFEFF/,'');
  for(let i=0;i<clean.length;i++){
    const ch=clean[i],nx=clean[i+1];
    if(q){if(ch==='"'&&nx==='"'){cur+='"';i++}else if(ch==='"'){q=false}else{cur+=ch}}
    else{if(ch==='"'){q=true}else if(ch===','){row.push(cur);cur=''}else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur=''}else if(ch==='\r'){}else{cur+=ch}}
  }
  row.push(cur);if(row.length>1||row[0]!=='')rows.push(row);
  return rows;
}
function isDuplicateTxn(plan,txn){
  const arr=plan==='TFSA'?tT:fT;
  return arr.some(t=>t.d===txn.d&&t.inst===txn.inst&&t.acct===txn.acct&&t.type===txn.type&&Math.abs(safeNum(t.amt)-safeNum(txn.amt))<0.005);
}
function exportCSV(plan='ALL'){
  const rows=[["plan","date","institution","account","type","amount","treatment","status","note"]];
  const add=(p,t)=>rows.push([p,t.d||'',t.inst||'',t.acct||'',t.type||'',t.amt||'',t.treat||'',t.status||'',t.note||'']);
  if(plan==='ALL'||plan==='TFSA')tT.forEach(t=>add('TFSA',t));
  if(plan==='ALL'||plan==='FHSA')fT.forEach(t=>add('FHSA',t));
  const blob=new Blob([toCSV(rows)],{type:'text/csv;charset=utf-8'});
  const u=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=u;a.download='tracker_'+String(plan).toLowerCase()+'_'+new Date().toISOString().split('T')[0]+'.csv';a.click();URL.revokeObjectURL(u);
}
function downloadCSVTemplate(plan='ALL'){
  const rows=[["plan","date","institution","account","type","amount","treatment","status","note"]];
  if(plan==='ALL'||plan==='TFSA'){
    rows.push(["TFSA","2026-04-01","Wealthsimple","manual","Contribution","100.00","Include","","Optional note"]);
    rows.push(["TFSA","2026-04-15","Wealthsimple","manual","Transfer In","5000.00","Include","","Room-neutral transfer"]);
  }
  if(plan==='ALL'||plan==='FHSA'){
    rows.push(["FHSA","2026-04-01","Wealthsimple","HQ5XRTH65CAD","Contribution","100.00","","Include","Optional note"]);
    rows.push(["FHSA","2026-04-15","Wealthsimple","HQ5XRTH65CAD","RRSP Transfer In","500.00","","Include","Counts against participation room"]);
  }
  const blob=new Blob([toCSV(rows)],{type:'text/csv;charset=utf-8'});
  const u=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=u;a.download='tracker_'+String(plan).toLowerCase()+'_template.csv';a.click();URL.revokeObjectURL(u);
}
function openCsvPicker(){const el=document.getElementById('csv-file');if(el){el.value='';el.click()}}
function importCSVText(text){
  const rows=parseCSV(text);
  if(rows.length<2){alert('CSV has no data rows.');return}
  const hdr=rows[0].map(h=>String(h||'').trim().toLowerCase());
  const idx=name=>hdr.indexOf(name);
  const missing=['plan','date','institution','account','type','amount'].filter(c=>idx(c)===-1);
  if(missing.length){alert('Missing CSV columns: '+missing.join(', '));return}
  const dateRe=/^\d{4}-\d{2}-\d{2}$/;
  let added=0,skipped=0,dupes=0;
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!r.some(v=>String(v||'').trim()))continue;
    const plan=String(r[idx('plan')]||'').trim().toUpperCase();
    const d=String(r[idx('date')]||'').trim();
    const inst=String(r[idx('institution')]||'').trim();
    const acct=String(r[idx('account')]||'').trim()||'manual';
    const rawType=String(r[idx('type')]||'Contribution').trim();
    const amt=safeNum(r[idx('amount')]||'0');
    const treat=idx('treatment')>-1?normalizeFlag(r[idx('treatment')],'Include'):'Include';
    const status=idx('status')>-1?normalizeFlag(r[idx('status')],'Include'):'Include';
    const note=idx('note')>-1?String(r[idx('note')]||'').trim():'';
    if(!plan||!d||!inst||amt<=0||!dateRe.test(d)){skipped++;continue}
    if(plan==='TFSA'){
      const txn={d,inst,acct,type:normalizeTfsaType(rawType),amt,treat,note};
      if(isDuplicateTxn('TFSA',txn)){dupes++;continue}
      tT.push(txn);added++;
    } else if(plan==='FHSA'){
      const txn={d,inst,acct,type:normalizeFhsaType(rawType),amt,status,note};
      if(isDuplicateTxn('FHSA',txn)){dupes++;continue}
      fT.push(txn);added++;
    } else {skipped++}
  }
  save();render();
  let msg='Imported '+added+' transaction(s).';
  if(dupes>0)msg+=' Skipped '+dupes+' duplicate(s).';
  if(skipped>0)msg+=' Skipped '+skipped+' invalid row(s).';
  alert(msg);
}
function handleCsvFile(evt){
  const f=evt.target.files&&evt.target.files[0];if(!f)return;
  const reader=new FileReader();reader.onload=e=>importCSVText(String(e.target.result||''));reader.readAsText(f);
}

// ═══════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════
function buildSettingsTable(){
  const tbody=document.querySelector('#limits-table tbody');if(!tbody)return;
  let html='';
  for(let y=2009;y<=Math.max(getCurrentYear()+5,2035);y++){
    const val=trackerConfig.tfsaAnnualLimits[y]??OFFICIAL_TFSA_LIMITS[y]??0;
    const official=OFFICIAL_TFSA_LIMITS[y]!==undefined;
    html+=`<tr><td class="mute">${y}</td><td class="r"><input type="number" step="0.01" data-year="${y}" class="limit-input t-input" value="${val}"></td><td class="dim">${official?'CRA official':'Editable future year'}</td></tr>`;
  }
  tbody.innerHTML=html;
}
function openSettings(){
  document.getElementById('s-tfsa-start').value=trackerConfig.tfsaEligibleStartYear;
  document.getElementById('s-current-year').value=trackerConfig.currentYear;
  document.getElementById('s-fhsa-start').value=trackerConfig.fhsaFirstYear;
  document.getElementById('s-fhsa-annual').value=trackerConfig.fhsaAnnualLimit;
  document.getElementById('s-fhsa-life').value=trackerConfig.fhsaLifetimeLimit;
  document.getElementById('s-fhsa-carry').value=trackerConfig.fhsaCarryforwardCap;
  buildSettingsTable();
  document.getElementById('settings-modal').classList.remove('hidden');
}
function closeSettings(){document.getElementById('settings-modal').classList.add('hidden')}
function saveSettings(){
  // Validate critical fields aren't empty or destructive
  const startVal=+document.getElementById('s-tfsa-start').value;
  const cyVal=+document.getElementById('s-current-year').value;
  const fhsaStartVal=+document.getElementById('s-fhsa-start').value;
  const annualVal=safeNum(document.getElementById('s-fhsa-annual').value);
  const lifeVal=safeNum(document.getElementById('s-fhsa-life').value);
  const carryVal=safeNum(document.getElementById('s-fhsa-carry').value);
  if(!startVal||startVal<2009||startVal>2100){alert('TFSA start year must be between 2009 and 2100.');return}
  if(!cyVal||cyVal<2009||cyVal>2100){alert('Planning year must be between 2009 and 2100.');return}
  if(!fhsaStartVal||fhsaStartVal<2023){alert('FHSA start year must be 2023 or later.');return}
  if(annualVal<=0||lifeVal<=0||carryVal<=0){alert('FHSA limits must be positive numbers.');return}
  if(!confirm('Save these settings? This will recalculate all room and tax values.'))return;
  // Backup before applying
  const backup=clone(trackerConfig);
  try{
    trackerConfig.tfsaEligibleStartYear=startVal;
    trackerConfig.currentYear=cyVal;
    trackerConfig.fhsaFirstYear=fhsaStartVal;
    trackerConfig.fhsaAnnualLimit=annualVal;
    trackerConfig.fhsaLifetimeLimit=lifeVal;
    trackerConfig.fhsaCarryforwardCap=carryVal;
    // Read limit inputs — if table rendered, use its values; otherwise keep existing limits
    const limitInputs=document.querySelectorAll('.limit-input');
    if(limitInputs.length>0){
      const newLimits={};
      limitInputs.forEach(inp=>{newLimits[inp.dataset.year]=safeNum(inp.value)});
      trackerConfig.tfsaAnnualLimits=newLimits;
    }
    // else: keep trackerConfig.tfsaAnnualLimits as-is (safe fallback)
    closeSettings();save();render();
  }catch(e){
    console.error('Settings save failed, restoring backup:',e);
    trackerConfig=backup;
    alert('Error saving settings. Previous values restored.');
  }
}
function exportJSON(){
  const b=new Blob([JSON.stringify({config:trackerConfig,tfsaTxns:tT,fhsaTxns:fT,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='tracker_backup_'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(u);
}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{
    const f=e.target.files&&e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(String(ev.target.result||''));
        if(!d||typeof d!=='object'){alert('Invalid JSON file.');return}
        // Validate structure
        const hasTxns=Array.isArray(d.tfsaTxns)||Array.isArray(d.fhsaTxns)||Array.isArray(d.t)||Array.isArray(d.f);
        if(!hasTxns&&!d.config){alert('JSON file does not contain recognized tracker data (expected tfsaTxns/fhsaTxns arrays or config).');return}
        if(!confirm('Import this backup? This will REPLACE all current data.\n\nTFSA txns: '+(d.tfsaTxns||d.t||[]).length+'\nFHSA txns: '+(d.fhsaTxns||d.f||[]).length+'\n\nContinue?'))return;
        if(d.tfsaTxns||d.t)tT=d.tfsaTxns||d.t;
        if(d.fhsaTxns||d.f)fT=d.fhsaTxns||d.f;
        if(d.config)trackerConfig=Object.assign(clone(CONFIG_DEFAULTS),d.config,{tfsaAnnualLimits:Object.assign(clone(CONFIG_DEFAULTS.tfsaAnnualLimits),(d.config&&d.config.tfsaAnnualLimits)||{})});
        if(d.prefs)uiPrefs=Object.assign(clone(UI_DEFAULTS),d.prefs);
        seedNormalizedData();save();render();
        alert('JSON backup imported successfully.');
      }catch(err){alert('Failed to parse JSON: '+err.message)}
    };
    reader.readAsText(f);
  };
  inp.click();
}
function exportSettingsCSV(){
  const rows=[["setting","key","value"],["tfsa_start_year","",trackerConfig.tfsaEligibleStartYear],["current_year","",trackerConfig.currentYear],["fhsa_first_year","",trackerConfig.fhsaFirstYear],["fhsa_annual_limit","",trackerConfig.fhsaAnnualLimit],["fhsa_lifetime_limit","",trackerConfig.fhsaLifetimeLimit],["fhsa_carryforward_cap","",trackerConfig.fhsaCarryforwardCap],["","",""],["tfsa_limit","year","limit"]];
  Object.keys(trackerConfig.tfsaAnnualLimits).sort().forEach(y=>rows.push(["tfsa_limit",y,trackerConfig.tfsaAnnualLimits[y]]));
  const blob=new Blob([toCSV(rows)],{type:'text/csv;charset=utf-8'});
  const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='tracker_settings_'+new Date().toISOString().split('T')[0]+'.csv';a.click();URL.revokeObjectURL(u);
}
function resetData(){
  if(!confirm('⚠️ This will ERASE all your local changes and restore the original seeded data.\n\nYour current transactions, settings, and any imported data will be lost.\n\nAre you sure?'))return;
  if(!confirm('Final confirmation: Reset everything to defaults?'))return;
  tT=expandT(INIT_T);fT=expandF(INIT_F);trackerConfig=clone(CONFIG_DEFAULTS);uiPrefs=clone(UI_DEFAULTS);save();render();
}

// ─── Normalize existing data on load ───
function seedNormalizedData(){
  const dateRe=/^\d{4}-\d{2}-\d{2}$/;
  tT=tT.filter(t=>dateRe.test(String(t.d||''))).map(t=>({d:String(t.d||''),inst:t.inst||'',acct:t.acct||'manual',type:normalizeTfsaType(t.type),amt:safeNum(t.amt),treat:normalizeFlag(t.treat,'Include'),note:t.note||''}));
  fT=fT.filter(t=>dateRe.test(String(t.d||''))).map(t=>({d:String(t.d||''),inst:t.inst||'',acct:t.acct||'manual',type:normalizeFhsaType(t.type),amt:safeNum(t.amt),status:normalizeFlag(t.status,'Include'),note:t.note||''}));
}

// ═══════════════════════════════════════════════════
// THEME TOGGLE
// ═══════════════════════════════════════════════════
function toggleTheme(){
  _isDarkTheme=!_isDarkTheme;
  document.documentElement.classList.toggle('light',!_isDarkTheme);
  document.querySelector('.theme-toggle').textContent=_isDarkTheme?'☀':'☾';
  document.querySelector('meta[name="theme-color"]').content=_isDarkTheme?'#080810':'#f5f5f8';
  try{localStorage.setItem('tfsa-theme',_isDarkTheme?'dark':'light')}catch(e){}
}
function loadTheme(){
  try{
    const t=localStorage.getItem('tfsa-theme');
    if(t==='light'){_isDarkTheme=false;document.documentElement.classList.add('light');document.querySelector('.theme-toggle').textContent='☾';document.querySelector('meta[name="theme-color"]').content='#f5f5f8'}
  }catch(e){}
}

// ═══════════════════════════════════════════════════
// KEYBOARD ACCESSIBILITY
// ═══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  // Don't fire shortcuts when typing in inputs
  const tag=document.activeElement?.tagName;
  const inInput=tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA';

  if(e.key==='Escape'){
    if(!document.getElementById('modal').classList.contains('hidden'))closeModal();
    if(!document.getElementById('settings-modal').classList.contains('hidden'))closeSettings();
  }
  if(inInput) return;

  // Navigation shortcuts (number keys)
  const viewMap={'1':'dashboard','2':'tfsa','3':'fhsa','4':'annual','5':'tax','6':'insights'};
  if(viewMap[e.key]&&!e.ctrlKey&&!e.metaKey){showView(viewMap[e.key]);return}

  // N = new transaction (context-aware)
  if(e.key==='n'&&!e.ctrlKey&&!e.metaKey){
    if(curView==='tfsa')openModal('TFSA');
    else if(curView==='fhsa')openModal('FHSA');
  }
  // T = toggle theme
  if(e.key==='t'&&!e.ctrlKey&&!e.metaKey) toggleTheme();
  // P = print
  if(e.key==='p'&&!e.ctrlKey&&!e.metaKey) window.print();
  // ? = show keyboard help
  if(e.key==='?') showToast('Keys: 1-6 navigate • N new txn • T theme • P print • ? help',null,4000);
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
document.getElementById('csv-file').addEventListener('change',handleCsvFile);
const isFirstLoad=!load();
if(isFirstLoad){tT=expandT(INIT_T);fT=expandF(INIT_F);trackerConfig=clone(CONFIG_DEFAULTS);uiPrefs=clone(UI_DEFAULTS)}
seedNormalizedData();
if(isFirstLoad) save(); // only write to localStorage on first-ever load (seeding defaults)
loadTheme();
render();

// Log self-test results to console (reuse cached)
if(!_cachedSelfTest) _cachedSelfTest=runSelfTest();
console.log('Engine self-test:',_cachedSelfTest.allPass?'ALL PASSED':'FAILURES DETECTED');
_cachedSelfTest.results.forEach(r=>console.log(`  ${r.pass?'✓':'✗'} ${r.label}: expected=${r.expected} actual=${safeNum(r.actual).toFixed(2)}`));
</script>
